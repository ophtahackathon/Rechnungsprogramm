name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create database
      run: python db_init.py

    - name: Build app with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name Rechnungsprogramm --icon=icon.icns main.py || pyinstaller --onefile --windowed --name Rechnungsprogramm main.py

    - name: Create .app bundle
      run: |
        mkdir -p Rechnungsprogramm.app/Contents/MacOS
        mkdir -p Rechnungsprogramm.app/Contents/Resources
        cp dist/Rechnungsprogramm Rechnungsprogramm.app/Contents/MacOS/
        cp rechnungen.db Rechnungsprogramm.app/Contents/Resources/ 2>/dev/null || true
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>Rechnungsprogramm</string>
            <key>CFBundleIdentifier</key>
            <string>com.rechnungsprogramm.app</string>
            <key>CFBundleName</key>
            <string>Rechnungsprogramm</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.12</string>
        </dict>
        </plist>' > Rechnungsprogramm.app/Contents/Info.plist

    - name: Create DMG
      run: |
        hdiutil create -volname "Rechnungsprogramm" -srcfolder Rechnungsprogramm.app -ov -format UDZO Rechnungsprogramm.dmg

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Rechnungsprogramm-macOS
        path: |
          Rechnungsprogramm.dmg
          Rechnungsprogramm.app/
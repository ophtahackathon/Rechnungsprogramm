name: Build macOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Create database
      run: python db_init.py

    - name: Build app with PyInstaller
      run: |
        pyinstaller --onedir --windowed --name Rechnungsprogramm main.py

    - name: Copy database to app
      run: |
        cp rechnungen.db dist/Rechnungsprogramm/

    - name: Create DMG
      run: |
        hdiutil create -volname "Rechnungsprogramm" -srcfolder dist/Rechnungsprogramm -ov -format UDZO Rechnungsprogramm.dmg

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Rechnungsprogramm-macOS
        path: Rechnungsprogramm.dmg